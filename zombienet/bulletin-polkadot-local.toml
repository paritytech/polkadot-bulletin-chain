# https://www.npmjs.com/package/@zombienet/cli
# To run the network, execute the following command:
# POLKADOT_BULLETIN_BINARY_PATH=./target/release/polkadot-bulletin-chain zombienet -p native spawn ./zombienet/bulletin-polkadot-local.toml

[relaychain]
chain = "bulletin-polkadot-local"
default_command = "{{POLKADOT_BULLETIN_BINARY_PATH}}"

[[relaychain.nodes]]
name = "alice"
p2p_port = 10001
rpc_port = 10000
validator = true
args = [
	"--ipfs-server",
	# Increase tx pool from 20->40 MiB
	# "--pool-kbytes 40960",
	# Extra WS listener on p2p_port + 1 for smoldot and IPFS/Bitswap.
	# Note: p2p_port (10001) is already managed by zombienet — do NOT add a duplicate --listen-addr for it.
	"--listen-addr=/ip4/127.0.0.1/tcp/10002/ws",
	"-lruntime=debug,sub-libp2p::bitswap=trace,runtime::transaction-storage=trace,litep2p::ipfs::bitswap=debug",
]

[[relaychain.nodes]]
name = "bob"
p2p_port = 12347
rpc_port = 12346
validator = true
args = [
	"--ipfs-server",
	# Increase tx pool from 20->40 MiB
	# "--pool-kbytes 40960",
	# Extra WS listener on p2p_port + 1 for smoldot and IPFS/Bitswap.
	# Note: p2p_port (12347) is already managed by zombienet — do NOT add a duplicate --listen-addr for it.
	"--listen-addr=/ip4/127.0.0.1/tcp/12348/ws",
	"-lruntime=debug,bitswap=trace,sub-libp2p::bitswap=trace,runtime::transaction-storage=trace,litep2p::ipfs::bitswap=debug",
]
