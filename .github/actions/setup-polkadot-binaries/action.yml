name: Setup polkadot binaries
description: |
  Resolve, download, cache, and PATH-expose polkadot relay + workers,
  polkadot-parachain, and chain-spec-builder.

  bin-vers chooses the source for the relay binary (polkadot), the two workers
  (polkadot-execute-worker, polkadot-prepare-worker), and polkadot-parachain:
    - release tag (e.g. polkadot-stable2603) -> curl from polkadot-sdk releases
    - PR-build tag matching ^[0-9]+-[a-f0-9]{6,}$ (e.g. 11662-afba6ccb)
      -> crane export from paritypr/polkadot-debug + paritypr/polkadot-parachain-debug

  chain-spec-builder-vers chooses the release tag for chain-spec-builder.

  verify-shas controls whether to check downloads against the SHA256 vars in
  .github/env (POLKADOT_SHA256, POLKADOT_PREPARE_WORKER_SHA256,
  POLKADOT_EXECUTE_WORKER_SHA256, POLKADOT_PARACHAIN_SHA256,
  CHAIN_SPEC_BUILDER_SHA256). Set to "false" when bin-vers is overridden away
  from the value those SHAs are pinned to.

inputs:
  bin-dir:
    description: Directory to install binaries into
    required: true
  bin-vers:
    description: Tag for polkadot + workers + polkadot-parachain (release tag or paritypr PR tag)
    required: true
  chain-spec-builder-vers:
    description: Release tag for chain-spec-builder (polkadot-sdk release tag)
    required: true
  verify-shas:
    description: Verify downloaded binaries against POLKADOT_*_SHA256 / CHAIN_SPEC_BUILDER_SHA256 env vars
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Resolve binary source
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ inputs.bin-vers }}" =~ ^[0-9]+-[a-f0-9]{6,}$ ]]; then
          echo "POLKADOT_BIN_SOURCE=pr"      >> "$GITHUB_ENV"
        else
          echo "POLKADOT_BIN_SOURCE=release" >> "$GITHUB_ENV"
        fi
        echo "Resolved polkadot binary source: bin-vers=${{ inputs.bin-vers }} chain-spec-builder-vers=${{ inputs.chain-spec-builder-vers }}"

    - name: Cache polkadot binaries
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      id: cache
      with:
        path: ${{ inputs.bin-dir }}
        key: polkadot-sdk-${{ inputs.chain-spec-builder-vers }}-relay-${{ inputs.bin-vers }}-binaries

    - name: Install crane (PR mode, cache miss)
      if: steps.cache.outputs.cache-hit != 'true' && env.POLKADOT_BIN_SOURCE == 'pr'
      shell: bash
      run: |
        set -euo pipefail
        CRANE_VERSION=v0.20.6
        curl -fsSL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
          | tar -xz -C /usr/local/bin crane
        crane version

    - name: Download chain-spec-builder (cache miss)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${{ inputs.bin-dir }}"
        cd "${{ inputs.bin-dir }}"
        curl -fL -o chain-spec-builder \
          "https://github.com/paritytech/polkadot-sdk/releases/download/${{ inputs.chain-spec-builder-vers }}/chain-spec-builder"
        if [ "${{ inputs.verify-shas }}" = "true" ]; then
          echo "${CHAIN_SPEC_BUILDER_SHA256}  chain-spec-builder" | sha256sum -c -
        fi
        chmod +x chain-spec-builder

    - name: Download polkadot relay + workers + polkadot-parachain (release mode)
      if: steps.cache.outputs.cache-hit != 'true' && env.POLKADOT_BIN_SOURCE == 'release'
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ inputs.bin-dir }}"
        base="https://github.com/paritytech/polkadot-sdk/releases/download/${{ inputs.bin-vers }}"
        curl -fL -o polkadot                "$base/polkadot"
        curl -fL -o polkadot-prepare-worker "$base/polkadot-prepare-worker"
        curl -fL -o polkadot-execute-worker "$base/polkadot-execute-worker"
        curl -fL -o polkadot-parachain      "$base/polkadot-parachain"
        if [ "${{ inputs.verify-shas }}" = "true" ]; then
          echo "${POLKADOT_SHA256}  polkadot"                               | sha256sum -c -
          echo "${POLKADOT_PREPARE_WORKER_SHA256}  polkadot-prepare-worker" | sha256sum -c -
          echo "${POLKADOT_EXECUTE_WORKER_SHA256}  polkadot-execute-worker" | sha256sum -c -
          echo "${POLKADOT_PARACHAIN_SHA256}  polkadot-parachain"           | sha256sum -c -
        fi
        chmod +x polkadot polkadot-prepare-worker polkadot-execute-worker polkadot-parachain
        ./polkadot --version
        ./polkadot-parachain --version

    - name: Download polkadot relay + workers + polkadot-parachain (PR mode)
      if: steps.cache.outputs.cache-hit != 'true' && env.POLKADOT_BIN_SOURCE == 'pr'
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ inputs.bin-dir }}"
        # paritypr publishes polkadot-debug and polkadot-parachain-debug under the
        # same PR-build tag (both built from the same polkadot-sdk PR commit).
        crane export "paritypr/polkadot-debug:${{ inputs.bin-vers }}" - \
          | tar -x --strip-components=3 \
            usr/local/bin/polkadot \
            usr/local/bin/polkadot-execute-worker \
            usr/local/bin/polkadot-prepare-worker
        crane export "paritypr/polkadot-parachain-debug:${{ inputs.bin-vers }}" - \
          | tar -x --strip-components=3 \
            usr/local/bin/polkadot-parachain
        chmod +x polkadot polkadot-prepare-worker polkadot-execute-worker polkadot-parachain
        ./polkadot --version
        ./polkadot-parachain --version

    - name: Add binaries to PATH
      shell: bash
      run: |
        chmod +x "${{ inputs.bin-dir }}"/*
        echo "${{ inputs.bin-dir }}" >> "$GITHUB_PATH"
