name: Zombienet SDK Tests

on:
  workflow_dispatch:
  pull_request:
    # `labeled` lets the sync suite kick in mid-PR when the `zombienet-sync-tests` label is
    # added; auto-renew runs on every push regardless via its lack of an `if:` gate.
    types: [opened, synchronize, reopened, labeled]
  # Run on pushes to `main` so the post-merge workflow populates the polkadot-binaries cache
  # under main's scope. PRs whose base is `main` can then read that cache and skip the cold
  # ~17-min source build of polkadot, even on a fresh `POLKADOT_NODE_VERSION` bump.
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  set-image:
    uses: ./.github/workflows/set-image.yml

  prepare-binaries:
    name: Fetch polkadot binaries + bulletin chain specs
    needs: [set-image]
    runs-on: parity-large
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load common environment variables via env file
        run: cat .github/env >> $GITHUB_ENV

      - name: Ensure `just` is available
        run: command -v just || cargo install just --locked

      # Polkadot binaries cache: keyed only by the polkadot-sdk + chain-spec-builder versions,
      # so it stays warm across every PR that doesn't bump those env values.
      - name: Cache polkadot-sdk binaries
        id: cache-binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          # Cache ONLY the resolved binary subdirs, not the entire `.polkadot-binaries/`.
          # The latter contains `.polkadot-binaries/_src/` — the polkadot-sdk source clone +
          # cargo target from the cold-build path (~11 GB) — which we don't need to
          # distribute: cache hits are detected by `scripts/get_polkadot_binaries.sh` looking
          # for the binary file at `polkadot-node/<version>/<platform>/polkadot`. The two
          # subdirs below total ~333 MB.
          path: |
            .polkadot-binaries/polkadot-node
            .polkadot-binaries/chain-spec-builder
          key: polkadot-binaries-${{ runner.os }}-${{ env.POLKADOT_NODE_VERSION }}-${{ env.CHAIN_SPEC_BUILDER_VERSION }}

      - name: Fetch / build polkadot binaries
        if: steps.cache-binaries.outputs.cache-hit != 'true'
        run: |
          just binaries-polkadot
          just binaries-chain-spec-builder

      # Bulletin chain specs cache: keyed by commit SHA because the spec embeds the bulletin
      # runtime WASM, which depends on every line of source under the runtime/pallet crates.
      # On a hit, matrix legs skip the ~4-min `cargo build -p bulletin-*-runtime` per leg.
      - name: Cache bulletin chain specs
        id: cache-specs
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            zombienet/bulletin-westend-spec.json
            zombienet/bulletin-paseo-spec.json
          key: bulletin-specs-${{ runner.os }}-${{ github.sha }}

      - name: Generate chain specs
        if: steps.cache-specs.outputs.cache-hit != 'true'
        run: |
          just chain-spec westend
          just chain-spec paseo

  zombienet-auto-renew-tests:
    needs: [set-image, prepare-binaries]
    name: auto-renew / ${{ matrix.runtime.name }} / ${{ matrix.group }}
    runs-on: parity-large
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    # Wall-clock budgets after group split + shared harness:
    #   archive/pruning: ~25-40 min (4 / 3 tests, one shared network)
    #   restart:         ~20-30 min (3 tests, each its own network)
    #   mixed:           ~50-70 min (5 tests, each its own network)
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: westend
            para_id: 1010
          - name: paseo
            para_id: 1501
        group:
          - archive
          - pruning
          - restart
          - mixed
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load common environment variables via env file
        run: cat .github/env >> $GITHUB_ENV

      - name: Ensure `just` is available
        run: command -v just || cargo install just --locked

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: .
          shared-key: "bulletin-cache-zombienet-auto-renew-tests-${{ matrix.runtime.name }}"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Restore the artifacts produced by `prepare-binaries`. Cache restore is ~1-2 min for
      # ~330 MB vs ~10-12 min over `actions/download-artifact` — and skips one moving part
      # (the GH artifact service, which has flaked twice on this workflow).
      - name: Restore polkadot binaries cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          # Cache ONLY the resolved binary subdirs, not the entire `.polkadot-binaries/`.
          # The latter contains `.polkadot-binaries/_src/` — the polkadot-sdk source clone +
          # cargo target from the cold-build path (~11 GB) — which we don't need to
          # distribute: cache hits are detected by `scripts/get_polkadot_binaries.sh` looking
          # for the binary file at `polkadot-node/<version>/<platform>/polkadot`. The two
          # subdirs below total ~333 MB.
          path: |
            .polkadot-binaries/polkadot-node
            .polkadot-binaries/chain-spec-builder
          key: polkadot-binaries-${{ runner.os }}-${{ env.POLKADOT_NODE_VERSION }}-${{ env.CHAIN_SPEC_BUILDER_VERSION }}
          fail-on-cache-miss: true

      - name: Restore bulletin chain specs cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            zombienet/bulletin-westend-spec.json
            zombienet/bulletin-paseo-spec.json
          key: bulletin-specs-${{ runner.os }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Mark binaries executable
        run: chmod -R +x .polkadot-binaries

      - name: Run zombienet auto-renew tests
        env:
          PARACHAIN_ID: ${{ matrix.runtime.para_id }}
        run: just test-zombienet-auto-renew ${{ matrix.runtime.name }} ${{ matrix.group }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: zombienet-auto-renew-test-logs-${{ matrix.runtime.name }}-${{ matrix.group }}
          path: /tmp/zombie-*/**/*.log
          retention-days: 14

  zombienet-sync-tests:
    # Sync suite is heavy (~120 min) — only run on manual dispatch or when the PR has the
    # `zombienet-sync-tests` label.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'zombienet-sync-tests'))
    needs: [set-image, prepare-binaries]
    name: sync / ${{ matrix.runtime.name }}
    runs-on: parity-large
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: westend
            para_id: 1010
          - name: paseo
            para_id: 1501
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load common environment variables via env file
        run: cat .github/env >> $GITHUB_ENV

      - name: Ensure `just` is available
        run: command -v just || cargo install just --locked

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: .
          shared-key: "bulletin-cache-zombienet-sync-tests-${{ matrix.runtime.name }}"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Restore polkadot binaries cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          # Cache ONLY the resolved binary subdirs, not the entire `.polkadot-binaries/`.
          # The latter contains `.polkadot-binaries/_src/` — the polkadot-sdk source clone +
          # cargo target from the cold-build path (~11 GB) — which we don't need to
          # distribute: cache hits are detected by `scripts/get_polkadot_binaries.sh` looking
          # for the binary file at `polkadot-node/<version>/<platform>/polkadot`. The two
          # subdirs below total ~333 MB.
          path: |
            .polkadot-binaries/polkadot-node
            .polkadot-binaries/chain-spec-builder
          key: polkadot-binaries-${{ runner.os }}-${{ env.POLKADOT_NODE_VERSION }}-${{ env.CHAIN_SPEC_BUILDER_VERSION }}
          fail-on-cache-miss: true

      - name: Restore bulletin chain specs cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            zombienet/bulletin-westend-spec.json
            zombienet/bulletin-paseo-spec.json
          key: bulletin-specs-${{ runner.os }}-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Mark binaries executable
        run: chmod -R +x .polkadot-binaries

      - name: Run zombienet sync tests
        env:
          PARACHAIN_ID: ${{ matrix.runtime.para_id }}
        # parachain_ldb_storage_verification_test requires the rocksdb `ldb` CLI,
        # which is not packaged for Debian Bullseye — skipped by the just recipe.
        run: just test-zombienet-sync ${{ matrix.runtime.name }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: zombienet-sync-test-logs-bulletin-${{ matrix.runtime.name }}
          path: /tmp/zombie-*/**/*.log
          retention-days: 14
