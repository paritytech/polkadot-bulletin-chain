name: Chainspec sync check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'chainspecs/**'
      - '.github/workflows/chainspec-sync-check.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OMNI_NODE_VERSION: polkadot-stable2603
  OMNI_NODE_SHA256: a96cb007f3e32de3b0d77dc25cab324d7067cca26f1a5aad4d05d748cf89e323
  OMNI_NODE_BIN_DIR: ${{ github.workspace }}/.omni-node-bin

jobs:
  sync-check:
    name: Sync (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: polkadot
            chainspec: chainspecs/polkadot-chainspec.json
            relay_rpc: wss://rpc.polkadot.io
          - name: westend
            chainspec: chainspecs/westend-chainspec.json
            relay_rpc: wss://westend-rpc.polkadot.io
          - name: paseo-next
            chainspec: chainspecs/paseo-next-chainspec.json
            relay_rpc: wss://paseo.dotters.network
          - name: paseo-next-v2
            chainspec: chainspecs/paseo-next-v2-chainspec.json
            relay_rpc: wss://paseo.dotters.network
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache polkadot-omni-node
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: omni-node-cache
        with:
          path: ${{ env.OMNI_NODE_BIN_DIR }}
          key: omni-node-${{ env.OMNI_NODE_VERSION }}

      - name: Download polkadot-omni-node
        if: steps.omni-node-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$OMNI_NODE_BIN_DIR"
          cd "$OMNI_NODE_BIN_DIR"
          curl -fL -o polkadot-omni-node \
            "https://github.com/paritytech/polkadot-sdk/releases/download/${OMNI_NODE_VERSION}/polkadot-omni-node"
          echo "${OMNI_NODE_SHA256}  polkadot-omni-node" | sha256sum -c -
          chmod +x polkadot-omni-node

      - name: Sync a few blocks
        env:
          CHAINSPEC: ${{ matrix.chainspec }}
          RELAY_RPC: ${{ matrix.relay_rpc }}
        run: |
          set -euo pipefail
          BIN="$OMNI_NODE_BIN_DIR/polkadot-omni-node"
          LOG="omni-node.log"
          TARGET_BLOCKS=3
          TIMEOUT_SECONDS=600

          "$BIN" \
            --chain "$CHAINSPEC" \
            --tmp \
            --no-hardware-benchmarks \
            --rpc-port 9944 \
            --relay-chain-rpc-urls "$RELAY_RPC" \
            --log info \
            > "$LOG" 2>&1 &
          NODE_PID=$!

          cleanup() {
            kill "$NODE_PID" 2>/dev/null || true
            wait "$NODE_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          deadline=$(( $(date +%s) + TIMEOUT_SECONDS ))
          best=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            if ! kill -0 "$NODE_PID" 2>/dev/null; then
              echo "polkadot-omni-node exited before reaching block $TARGET_BLOCKS"
              tail -n 200 "$LOG"
              exit 1
            fi

            response=$(curl -fs -m 5 -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"chain_getHeader","params":[],"id":1}' \
              http://127.0.0.1:9944 || true)
            hex=$(echo "$response" | jq -r '.result.number // "0x0"' 2>/dev/null || echo "0x0")
            best=$(( hex ))
            echo "best block: $best"

            if [ "$best" -ge "$TARGET_BLOCKS" ]; then
              echo "imported $best blocks for $CHAINSPEC"
              exit 0
            fi

            sleep 10
          done

          echo "did not import $TARGET_BLOCKS blocks within ${TIMEOUT_SECONDS}s (last best=$best)"
          tail -n 200 "$LOG"
          exit 1

      - name: Upload omni-node log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: omni-node-${{ matrix.name }}.log
          path: omni-node.log
          retention-days: 7

  sync-check-complete:
    name: All chainspec sync checks passed
    needs: [sync-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Decide outcome
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "Chainspec sync check failed or was cancelled"
          exit 1
