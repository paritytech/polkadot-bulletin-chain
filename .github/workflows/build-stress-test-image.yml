name: Build stress-test image

on:
  push:
    branches: [main]
    paths:
      - "stress-test/**"
  pull_request:
    paths:
      - "stress-test/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stress-test-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: docker.io/paritypr/bulletin-stress-test

jobs:
  check:
    name: Build & verify binary
    runs-on: ubuntu-latest
    container:
      image: paritytech/ci-unified:bullseye-1.88.0-2025-06-27-v202507112050
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build stress-test binary
        run: cargo build --release -p bulletin-stress-test

      - name: Verify binary runs
        run: ./target/release/bulletin-stress-test --help

  image:
    name: Build Docker image
    needs: [check]
    runs-on: ubuntu-latest
    env:
      HAS_DOCKERHUB_CREDS: ${{ secrets.PARITYPR_DOCKERHUB_USERNAME != '' && secrets.PARITYPR_DOCKERHUB_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        if: ${{ env.HAS_DOCKERHUB_CREDS == 'true' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.PARITYPR_DOCKERHUB_USERNAME }}
          password: ${{ secrets.PARITYPR_DOCKERHUB_PASSWORD }}

      - name: Compute image tag
        id: tag
        shell: bash
        env:
          GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAG="${{ github.event.pull_request.number }}-${GITHUB_PR_HEAD_SHA::8}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="main-${GITHUB_SHA::8}"
          else
            TAG="${GITHUB_SHA::8}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: stress-test/Dockerfile
          push: ${{ env.HAS_DOCKERHUB_CREDS == 'true' }}
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
