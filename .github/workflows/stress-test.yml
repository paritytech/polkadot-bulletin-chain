name: Stress Test
# Manually triggered stress test for Bulletin Chain

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Scenario: throughput (block-capacity) | sequential-upload | bitswap (b2 reads) | bulk-read | renew | full"
        required: true
        default: "throughput"
        type: choice
        options:
          - throughput
          - sequential-upload
          - bitswap
          - bulk-read
          - renew
          - full
      ws_url:
        description: "WebSocket URL(s), comma-separated for multi-node"
        required: true
        default: "wss://westend-bulletin-rpc.polkadot.io"
      variants:
        description: "Throughput variants filter (e.g. 1KB,128KB,1MB). Empty = all"
        required: false
        default: "1MB"
      target_blocks:
        description: "Number of steady-state blocks to measure per variant"
        required: false
        default: "20"
      submitters:
        description: "Number of concurrent submitter tasks"
        required: false
        default: "16"
      iterations:
        description: "Number of items for Bitswap read tests"
        required: false
        default: "128"
      payload_size:
        description: "Bitswap payload size in bytes"
        required: false
        default: "131072"
      authorizer_seed:
        description: "Seed for the authorizer account"
        required: false
        default: "//Alice"
      p2p_multiaddr:
        description: "P2P multiaddr for Bitswap (auto-discovered if empty)"
        required: false
        default: ""
      extra_args:
        description: "Extra scenario flags appended verbatim — e.g. sequential-upload '--instances 4 --total-size 52428800'; bulk-read '--read-concurrency 32'; renew '--store-count 1000'. Allowed: alphanumeric, spaces, and . _ , / = -"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: stress-test-${{ github.run_id }}
  cancel-in-progress: true

env:
  # Resolve inputs with fallback defaults (inputs.* is empty on push triggers)
  ST_COMMAND: ${{ inputs.command || 'throughput' }}
  ST_WS_URL: ${{ inputs.ws_url || 'wss://westend-bulletin-rpc.polkadot.io' }}
  ST_VARIANTS: ${{ inputs.variants || '1MB' }}
  ST_TARGET_BLOCKS: ${{ inputs.target_blocks || '20' }}
  ST_SUBMITTERS: ${{ inputs.submitters || '16' }}
  ST_ITERATIONS: ${{ inputs.iterations || '128' }}
  ST_PAYLOAD_SIZE: ${{ inputs.payload_size || '131072' }}
  ST_AUTHORIZER_SEED: ${{ inputs.authorizer_seed || '//Alice' }}
  ST_P2P_MULTIADDR: ${{ inputs.p2p_multiaddr || '' }}
  ST_EXTRA_ARGS: ${{ inputs.extra_args || '' }}

jobs:
  set-image:
    uses: ./.github/workflows/set-image.yml

  stress-test:
    needs: [set-image]
    name: "Stress Test (${{ inputs.command || 'throughput' }})"
    runs-on: parity-large
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    timeout-minutes: 2880
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load common environment variables
        run: cat .github/env >> $GITHUB_ENV

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: .
          shared-key: "bulletin-cache-stress-test"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build stress test binary
        run: cargo build --release -p bulletin-stress-test

      - name: Mask authorizer seed
        run: echo "::add-mask::$ST_AUTHORIZER_SEED"

      - name: Validate inputs
        run: |
          set -e

          # Validate numeric inputs
          for var in ST_TARGET_BLOCKS ST_SUBMITTERS ST_ITERATIONS ST_PAYLOAD_SIZE; do
            val="${!var}"
            if ! [[ "$val" =~ ^[0-9]+$ ]]; then
              echo "::error::Invalid numeric input $var='$val'"
              exit 1
            fi
          done

          # Validate URL format (must start with ws:// or wss://)
          IFS=',' read -ra URLS <<< "$ST_WS_URL"
          for url in "${URLS[@]}"; do
            url=$(echo "$url" | xargs)  # trim whitespace
            if ! [[ "$url" =~ ^wss?:// ]]; then
              echo "::error::Invalid WebSocket URL: '$url' (must start with ws:// or wss://)"
              exit 1
            fi
          done

          # Validate variants (alphanumeric, dots, commas only)
          if [ -n "$ST_VARIANTS" ]; then
            if ! [[ "$ST_VARIANTS" =~ ^[a-zA-Z0-9.,]+$ ]]; then
              echo "::error::Invalid variants filter: '$ST_VARIANTS' (allowed: alphanumeric, dots, commas)"
              exit 1
            fi
          fi

          # Validate authorizer seed (must start with //)
          if ! [[ "$ST_AUTHORIZER_SEED" =~ ^// ]]; then
            echo "::error::Invalid authorizer seed (must start with //)"
            exit 1
          fi

          # Validate p2p multiaddr (must start with / if provided)
          if [ -n "$ST_P2P_MULTIADDR" ]; then
            if ! [[ "$ST_P2P_MULTIADDR" =~ ^/ ]]; then
              echo "::error::Invalid P2P multiaddr (must start with /)"
              exit 1
            fi
          fi

          # Validate extra args — safe charset only (no shell metacharacters)
          if [ -n "$ST_EXTRA_ARGS" ]; then
            if ! [[ "$ST_EXTRA_ARGS" =~ ^[a-zA-Z0-9[:space:]._,/=-]+$ ]]; then
              echo "::error::Invalid extra args: '$ST_EXTRA_ARGS' (allowed: alphanumeric, spaces, and . _ , / = -)"
              exit 1
            fi
          fi

          echo "All inputs validated"

      - name: Run stress test
        run: |
          set -e

          # Build args array safely — no eval, no string interpolation in shell
          ARGS=(
            --ws-url "$ST_WS_URL"
            --submitters "$ST_SUBMITTERS"
            --target-blocks "$ST_TARGET_BLOCKS"
            --iterations "$ST_ITERATIONS"
            --authorizer-seed "$ST_AUTHORIZER_SEED"
            --output json
            --output-file results.json
          )

          if [ -n "$ST_P2P_MULTIADDR" ]; then
            ARGS+=(--p2p-multiaddr "$ST_P2P_MULTIADDR")
          fi

          case "$ST_COMMAND" in
            throughput)
              ARGS+=(throughput)
              if [ -n "$ST_VARIANTS" ]; then
                ARGS+=(--variants "$ST_VARIANTS")
              fi
              ;;
            sequential-upload)
              ARGS+=(throughput sequential-upload)
              ;;
            bitswap)
              ARGS+=(bitswap --payload-size "$ST_PAYLOAD_SIZE")
              ;;
            bulk-read)
              ARGS+=(bitswap bulk-read)
              ;;
            renew)
              # `renew` has its own (non-global) --target-blocks; pass it after the subcommand.
              ARGS+=(renew --target-blocks "$ST_TARGET_BLOCKS")
              ;;
            full)
              ARGS+=(full)
              ;;
          esac

          # Append free-form scenario-specific flags (validated charset; split on whitespace).
          if [ -n "$ST_EXTRA_ARGS" ]; then
            read -ra EXTRA_ARGS_ARR <<< "$ST_EXTRA_ARGS"
            ARGS+=("${EXTRA_ARGS_ARR[@]}")
          fi

          # Log command without authorizer seed
          SAFE_ARGS=("${ARGS[@]}")
          for i in "${!SAFE_ARGS[@]}"; do
            if [[ "${SAFE_ARGS[$i]}" == "--authorizer-seed" ]]; then
              SAFE_ARGS[$((i+1))]="<redacted>"
            fi
          done
          echo "Running: ./target/release/bulletin-stress-test ${SAFE_ARGS[*]}"

          # Tee stderr to file for artifact; results.json written by --output-file.
          ./target/release/bulletin-stress-test "${ARGS[@]}" 2> >(tee stress-test.log)

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stress-test-results-${{ env.ST_COMMAND }}-${{ github.run_number }}
          path: |
            results.json
            stress-test.log
          retention-days: 90

      - name: Print summary
        if: always()
        run: |
          if [ -f results.json ]; then
            echo "## Stress Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Command | \`${ST_COMMAND}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Target | \`${ST_WS_URL}\` |" >> $GITHUB_STEP_SUMMARY
            if [ -n "$ST_EXTRA_ARGS" ]; then
              echo "| Extra args | \`${ST_EXTRA_ARGS}\` |" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            # Exact invocation actually run (the binary already redacts the seed).
            CMDLINE=$(python3 -c "import json; d = json.load(open('results.json')); print((d[0].get('environment') or {}).get('command_line', '') if d else '')" 2>/dev/null || true)
            if [ -n "$CMDLINE" ]; then
              echo "**Invocation:**" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$CMDLINE" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            echo '```json' >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json, sys
          try:
              with open('results.json') as f:
                  data = json.load(f)
          except (json.JSONDecodeError, FileNotFoundError) as e:
              print(f'Failed to parse results: {e}', file=sys.stderr)
              sys.exit(0)
          MB = 1048576
          def to_ms(d):
              return round((d.get('secs', 0) + d.get('nanos', 0) / 1e9) * 1000, 1)
          for r in data:
              s = {'name': r.get('name', ''), 'duration_secs': r.get('duration', {}).get('secs', 0)}
              if r.get('total_reads') is not None:
                  # Read scenario (bitswap b2 / bulk-read)
                  s['total_reads'] = r.get('total_reads')
                  s['successful_reads'] = r.get('successful_reads')
                  s['failed_reads'] = r.get('failed_reads')
                  if r.get('reads_per_sec') is not None:
                      s['reads_per_sec'] = round(r['reads_per_sec'], 1)
                  if r.get('read_bytes_per_sec') is not None:
                      s['read_MB_per_sec'] = round(r['read_bytes_per_sec'] / MB, 1)
                  if r.get('data_verified') is not None:
                      s['data_verified'] = r['data_verified']
                  if r.get('retrieval_latency'):
                      lat = r['retrieval_latency']
                      s['retrieval_p50_ms'] = to_ms(lat['p50'])
                      s['retrieval_p95_ms'] = to_ms(lat['p95'])
              else:
                  # Write scenario (throughput / sequential-upload / renew)
                  s['payload_size'] = r.get('payload_size', 0)
                  if r.get('throughput_tps'):
                      s['throughput_tps'] = round(r['throughput_tps'], 2)
                      s['throughput_MB_per_sec'] = round(r.get('throughput_bytes_per_sec', 0) / MB, 2)
                  if r.get('total_confirmed') is not None or r.get('total_submitted') is not None:
                      s['total_submitted'] = r.get('total_submitted', 0)
                      s['total_confirmed'] = r.get('total_confirmed', 0)
                      s['total_errors'] = r.get('total_errors', 0)
                  if r.get('avg_tx_per_block'):
                      s['avg_tx_per_block'] = round(r['avg_tx_per_block'], 1)
                      s['peak_tx_per_block'] = r.get('peak_tx_per_block', 0)
                  if r.get('avg_block_interval_ms'):
                      s['avg_block_interval_ms'] = round(r['avg_block_interval_ms'], 0)
                  if r.get('fork_detections', 0) > 0:
                      s['fork_detections'] = r['fork_detections']
              print(json.dumps(s, indent=2))
              print()
          " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## Stress Test Results" >> $GITHUB_STEP_SUMMARY
            echo "No results.json produced." >> $GITHUB_STEP_SUMMARY
          fi
