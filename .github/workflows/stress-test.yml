name: Stress Test
# Manually triggered stress test for Bulletin Chain

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Command: throughput, bitswap, full, or plan"
        required: true
        default: "throughput"
        type: choice
        options:
          - throughput
          - bitswap
          - full
          - plan
      ws_url:
        description: "WebSocket URL(s), comma-separated for multi-node"
        required: true
        default: "wss://westend-bulletin-rpc.polkadot.io"
      variants:
        description: "Throughput variants filter (e.g. 1KB,128KB,MIXED). Empty = all"
        required: false
        default: "1MB"
      target_blocks:
        description: "Number of measured blocks per variant"
        required: false
        default: "20"
      submitters:
        description: "Number of concurrent submitter tasks"
        required: false
        default: "16"
      iteration_blocks:
        description: "Blocks worth of txs per pipeline iteration"
        required: false
        default: "20"
      mix_seed:
        description: "RNG seed for MIXED mode (empty = OS entropy)"
        required: false
        default: ""
      iterations:
        description: "Number of items for Bitswap read tests"
        required: false
        default: "128"
      payload_size:
        description: "Bitswap payload size in bytes"
        required: false
        default: "131072"
      plan_file:
        description: "YAML plan file path (for plan command only)"
        required: false
        default: ""
      authorizer_seed:
        description: "Seed for the authorizer account"
        required: false
        default: "//Alice"
      p2p_multiaddr:
        description: "P2P multiaddr for Bitswap (auto-discovered if empty)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: stress-test-${{ github.run_id }}
  cancel-in-progress: true

env:
  ST_COMMAND: ${{ inputs.command || 'throughput' }}
  ST_WS_URL: ${{ inputs.ws_url || 'wss://westend-bulletin-rpc.polkadot.io' }}
  ST_VARIANTS: ${{ inputs.variants || '1MB' }}
  ST_TARGET_BLOCKS: ${{ inputs.target_blocks || '20' }}
  ST_SUBMITTERS: ${{ inputs.submitters || '16' }}
  ST_ITERATION_BLOCKS: ${{ inputs.iteration_blocks || '20' }}
  ST_MIX_SEED: ${{ inputs.mix_seed || '' }}
  ST_ITERATIONS: ${{ inputs.iterations || '128' }}
  ST_PAYLOAD_SIZE: ${{ inputs.payload_size || '131072' }}
  ST_PLAN_FILE: ${{ inputs.plan_file || '' }}
  ST_AUTHORIZER_SEED: ${{ inputs.authorizer_seed || '//Alice' }}
  ST_P2P_MULTIADDR: ${{ inputs.p2p_multiaddr || '' }}

jobs:
  set-image:
    uses: ./.github/workflows/set-image.yml

  stress-test:
    needs: [set-image]
    name: "Stress Test (${{ inputs.command || 'throughput' }})"
    runs-on: parity-large
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    timeout-minutes: 2880
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load common environment variables
        run: cat .github/env >> $GITHUB_ENV

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: .
          shared-key: "bulletin-cache-stress-test"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build stress test binary
        run: cargo build --release -p bulletin-stress-test

      - name: Mask authorizer seed
        run: echo "::add-mask::$ST_AUTHORIZER_SEED"

      - name: Validate inputs
        run: |
          set -e

          for var in ST_TARGET_BLOCKS ST_SUBMITTERS ST_ITERATIONS ST_PAYLOAD_SIZE ST_ITERATION_BLOCKS; do
            val="${!var}"
            if ! [[ "$val" =~ ^[0-9]+$ ]]; then
              echo "::error::Invalid numeric input $var='$val'"
              exit 1
            fi
          done

          if [ -n "$ST_MIX_SEED" ] && ! [[ "$ST_MIX_SEED" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid mix_seed='$ST_MIX_SEED' (must be numeric)"
            exit 1
          fi

          IFS=',' read -ra URLS <<< "$ST_WS_URL"
          for url in "${URLS[@]}"; do
            url=$(echo "$url" | xargs)
            if ! [[ "$url" =~ ^wss?:// ]]; then
              echo "::error::Invalid WebSocket URL: '$url' (must start with ws:// or wss://)"
              exit 1
            fi
          done

          if [ -n "$ST_VARIANTS" ]; then
            if ! [[ "$ST_VARIANTS" =~ ^[a-zA-Z0-9.,]+$ ]]; then
              echo "::error::Invalid variants filter: '$ST_VARIANTS'"
              exit 1
            fi
          fi

          if ! [[ "$ST_AUTHORIZER_SEED" =~ ^// ]]; then
            echo "::error::Invalid authorizer seed (must start with //)"
            exit 1
          fi

          if [ -n "$ST_P2P_MULTIADDR" ] && ! [[ "$ST_P2P_MULTIADDR" =~ ^/ ]]; then
            echo "::error::Invalid P2P multiaddr (must start with /)"
            exit 1
          fi

          if [ -n "$ST_PLAN_FILE" ] && [ ! -f "$ST_PLAN_FILE" ]; then
            echo "::error::Plan file not found: '$ST_PLAN_FILE'"
            exit 1
          fi

          echo "All inputs validated"

      - name: Run stress test
        run: |
          set -e

          ARGS=(
            --ws-url "$ST_WS_URL"
            --submitters "$ST_SUBMITTERS"
            --target-blocks "$ST_TARGET_BLOCKS"
            --iteration-blocks "$ST_ITERATION_BLOCKS"
            --iterations "$ST_ITERATIONS"
            --authorizer-seed "$ST_AUTHORIZER_SEED"
            --output json
            --output-file results.json
          )

          if [ -n "$ST_MIX_SEED" ]; then
            ARGS+=(--mix-seed "$ST_MIX_SEED")
          fi

          if [ -n "$ST_P2P_MULTIADDR" ]; then
            ARGS+=(--p2p-multiaddr "$ST_P2P_MULTIADDR")
          fi

          case "$ST_COMMAND" in
            throughput)
              ARGS+=(throughput)
              if [ -n "$ST_VARIANTS" ]; then
                ARGS+=(--variants "$ST_VARIANTS")
              fi
              ;;
            bitswap)
              ARGS+=(bitswap --payload-size "$ST_PAYLOAD_SIZE")
              ;;
            full)
              ARGS+=(full)
              ;;
            plan)
              ARGS+=(plan)
              if [ -n "$ST_PLAN_FILE" ]; then
                ARGS+=(--file "$ST_PLAN_FILE")
              fi
              ;;
          esac

          # Log command without authorizer seed
          SAFE_ARGS=("${ARGS[@]}")
          for i in "${!SAFE_ARGS[@]}"; do
            if [[ "${SAFE_ARGS[$i]}" == "--authorizer-seed" ]]; then
              SAFE_ARGS[$((i+1))]="<redacted>"
            fi
          done
          echo "Running: ./target/release/bulletin-stress-test ${SAFE_ARGS[*]}"

          ./target/release/bulletin-stress-test "${ARGS[@]}" 2> >(tee stress-test.log)

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stress-test-results-${{ env.ST_COMMAND }}-${{ github.run_number }}
          path: |
            results*.json
            results*.html
            stress-test.log
          retention-days: 90

      - name: Print summary
        if: always()
        run: |
          # Find the timestamped results file
          RESULTS_FILE=$(ls -t results*.json 2>/dev/null | head -1)
          if [ -z "$RESULTS_FILE" ]; then
            echo "## Stress Test Results" >> $GITHUB_STEP_SUMMARY
            echo "No results produced." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "## Stress Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Command | \`${ST_COMMAND}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`${ST_WS_URL}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Submitters | ${ST_SUBMITTERS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Target blocks | ${ST_TARGET_BLOCKS} |" >> $GITHUB_STEP_SUMMARY
          if [ "$ST_COMMAND" = "throughput" ] && [ -n "$ST_VARIANTS" ]; then
            echo "| Variants | \`${ST_VARIANTS}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$ST_COMMAND" = "bitswap" ]; then
            echo "| Iterations | ${ST_ITERATIONS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Payload size | ${ST_PAYLOAD_SIZE} bytes |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json, sys
          try:
              with open('$RESULTS_FILE') as f:
                  data = json.load(f)
          except (json.JSONDecodeError, FileNotFoundError) as e:
              print(f'Failed to parse results: {e}', file=sys.stderr)
              sys.exit(0)

          # Overview table
          print('### Overview')
          print()
          print('| Variant | TPS | MB/s | Confirmed | Errors | Avg tx/blk | Duration |')
          print('|---------|-----|------|-----------|--------|------------|----------|')
          for r in data:
              name = r.get('name', '').split('(')[-1].rstrip(')')
              tps = round(r.get('throughput_tps', 0), 1)
              mbps = round(r.get('throughput_bytes_per_sec', 0) / 1048576, 2)
              confirmed = r.get('total_confirmed', 0)
              errors = r.get('total_errors', 0)
              avg_blk = round(r.get('avg_tx_per_block', 0), 1)
              dur = r.get('duration', {}).get('secs', 0)
              print(f'| {name} | {tps} | {mbps} | {confirmed} | {errors} | {avg_blk} | {dur}s |')
          print()

          # Distribution stats table
          has_stats = any(r.get('latency_ms') or r.get('block_tps') or r.get('block_mbps') for r in data)
          if has_stats:
              print('### Distribution Stats')
              print()
              print('| Variant | Metric | Min | Avg | P90 | P99 | Max |')
              print('|---------|--------|-----|-----|-----|-----|-----|')
              for r in data:
                  name = r.get('name', '').split('(')[-1].rstrip(')').split(',')[0]
                  for label, key in [('Latency (ms)', 'latency_ms'), ('Block TPS', 'block_tps'), ('Block MB/s', 'block_mbps')]:
                      s = r.get(key)
                      if s:
                          print(f'| {name} | {label} | {s[\"min\"]:.1f} | {s[\"avg\"]:.1f} | {s[\"p90\"]:.1f} | {s[\"p99\"]:.1f} | {s[\"max\"]:.1f} |')
              print()

          # Read stats (bitswap)
          has_reads = any(r.get('reads_per_sec') for r in data)
          if has_reads:
              print('### Read Stats')
              print()
              for r in data:
                  if r.get('reads_per_sec'):
                      print(f'- **{r[\"name\"]}**: {round(r[\"reads_per_sec\"], 1)} reads/s, {r.get(\"successful_reads\", 0)} ok, {r.get(\"failed_reads\", 0)} failed')
              print()
          " >> $GITHUB_STEP_SUMMARY
