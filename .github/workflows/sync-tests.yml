name: Zombienet Sync Tests

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

# Only run when manually triggered or when the zombienet-sync-tests label is present.
# Including 'synchronize' makes the workflow run on every push while the label is set,
# instead of only the single moment the label is applied.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  set-image:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'zombienet-sync-tests'))
    uses: ./.github/workflows/set-image.yml

  zombienet-sync-tests:
    needs: [set-image]
    name: Zombienet Sync Tests (bulletin-${{ matrix.runtime.name }})
    runs-on: parity-large
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: westend
            para_id: 1010
          - name: paseo
            para_id: 1501
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load common environment variables via env file
        run: cat .github/env >> $GITHUB_ENV

      - name: Ensure `just` is available
        run: command -v just || cargo install just --locked

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: .
          shared-key: "bulletin-cache-zombienet-sync-tests-${{ matrix.runtime.name }}"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache polkadot-sdk binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: .polkadot-binaries
          key: polkadot-binaries-${{ runner.os }}-${{ env.POLKADOT_NODE_VERSION }}-${{ env.CHAIN_SPEC_BUILDER_VERSION }}

      - name: Run zombienet sync tests
        env:
          PARACHAIN_ID: ${{ matrix.runtime.para_id }}
        # parachain_ldb_storage_verification_test requires the rocksdb `ldb` CLI,
        # which is not packaged for Debian Bullseye — skipped by the just recipe.
        run: just test-zombienet-sync ${{ matrix.runtime.name }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: zombienet-sync-test-logs-bulletin-${{ matrix.runtime.name }}
          path: /tmp/zombie-*/**/*.log
          retention-days: 14
