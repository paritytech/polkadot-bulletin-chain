name: Zombienet Auto-Renew Tests

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  set-image:
    uses: ./.github/workflows/set-image.yml

  zombienet-auto-renew-tests:
    needs: [set-image]
    name: Zombienet Auto-Renew Tests (bulletin-${{ matrix.runtime.name }})
    runs-on: parity-large
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    # The full auto-renew suite (basic, eviction, concurrent, many-items,
    # worst-case, on_initialize cleanup, restart variants, …) at ~5–10 min
    # per test totals ~60–90 min wall-clock per matrix runtime.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: westend
            para_id: 1010
          - name: paseo
            para_id: 1501
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Load common environment variables via env file
        run: cat .github/env >> $GITHUB_ENV

      - name: Ensure `just` is available
        run: command -v just || cargo install just --locked

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: .
          shared-key: "bulletin-cache-zombienet-auto-renew-tests-${{ matrix.runtime.name }}"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache polkadot-sdk binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: .polkadot-binaries
          key: polkadot-binaries-${{ runner.os }}-${{ env.POLKADOT_NODE_VERSION }}-${{ env.CHAIN_SPEC_BUILDER_VERSION }}

      - name: Run zombienet auto-renew tests
        env:
          PARACHAIN_ID: ${{ matrix.runtime.para_id }}
        run: just test-zombienet-auto-renew ${{ matrix.runtime.name }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: zombienet-auto-renew-test-logs-bulletin-${{ matrix.runtime.name }}
          path: /tmp/zombie-*/**/*.log
          retention-days: 14
