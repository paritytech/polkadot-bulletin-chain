name: CI

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Cancel previous runs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FRAME_OMNI_BENCHER_BIN_DIR: ${{ github.workspace }}/.frame-omni-bencher-bin

jobs:
  changes:
    uses: ./.github/workflows/check-changed-files.yml
    permissions:
      contents: read
      pull-requests: read

  set-image:
    if: needs.changes.outputs.should-run == 'true'
    needs: [changes]
    uses: ./.github/workflows/set-image.yml

  check-fmt:
    runs-on: parity-default
    timeout-minutes: 20
    needs: [set-image]
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cargo fmt
        run: |
          rustup component add --toolchain nightly-x86_64-unknown-linux-gnu rustfmt
          cargo +nightly fmt --all -- --check

      - name: Check TOML format
        run: |
          cargo install taplo-cli && taplo --version
          if ! taplo format --check --config .config/taplo.toml; then
            echo "Please run 'taplo format --config .config/taplo.toml' to fix any TOML formatting issues"
            exit 1
          fi
          cargo install --locked zepter && zepter --version
          if ! zepter run check --config .config/zepter.yaml; then
            echo "Please run 'zepter run --config .config/zepter.yaml' to fix any TOML formatting issues"
            exit 1
          fi

  check:
    name: Cargo check
    runs-on: parity-large
    needs: [set-image, check-fmt]
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "bulletin-cache-check"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cargo check
        run: |
          cargo check --workspace
          cargo check --workspace --features=runtime-benchmarks

  clippy:
    name: Cargo clippy
    runs-on: parity-default
    needs: [set-image, check]
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    env:
      RUSTFLAGS: "-D warnings"
      SKIP_WASM_BUILD: 1
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "bulletin-cache-clippy"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cargo clippy
        run: |
          cargo clippy --all-targets --locked --workspace --quiet
          cargo clippy --all-targets --all-features --locked --workspace --quiet

  test:
    name: Test
    runs-on: parity-large
    timeout-minutes: 60
    needs: [set-image, check-fmt]
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    env:
      SKIP_WASM_BUILD: 1
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "bulletin-cache-tests"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run pallets tests
        run: |
          cargo test -p pallet-bulletin-transaction-storage          
          cargo test -p pallet-bulletin-transaction-storage --features=runtime-benchmarks

      - name: Run (Westend) runtime tests
        run: |
          cargo test -p bulletin-westend-runtime

      - name: Run (Paseo) runtime tests
        run: |
          cargo test -p bulletin-paseo-runtime

      - name: Run (Westend) XCM integration tests
        run: |
          unset SKIP_WASM_BUILD
          cargo test -p bulletin-westend-integration-tests

  benchmarks:
    name: Check Benchmarks (${{ matrix.runtime.name }})
    runs-on: parity-large
    timeout-minutes: 60
    needs: [set-image, check-fmt]
    container:
      image: ${{ needs.set-image.outputs.CI_IMAGE }}
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: bulletin-westend
            package: bulletin-westend-runtime
          - name: bulletin-paseo
            package: bulletin-paseo-runtime
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "bulletin-cache-benchmarks-${{ matrix.runtime.name }}"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Load common environment variables via env file
        run: cat .github/env >> $GITHUB_ENV

      - name: Create directory for binary and add to PATH
        run: |
          mkdir -p $FRAME_OMNI_BENCHER_BIN_DIR
          echo "${FRAME_OMNI_BENCHER_BIN_DIR}" >> $GITHUB_PATH

      - name: Cache frame-omni-bencher
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: frame-omni-bencher-cache
        with:
          path: ${{ env.FRAME_OMNI_BENCHER_BIN_DIR }}
          key: frame-omni-bencher-${{ env.POLKADOT_SDK_VERSION }}

      - name: Download frame-omni-bencher
        if: steps.frame-omni-bencher-cache.outputs.cache-hit != 'true'
        run: |
          cd $FRAME_OMNI_BENCHER_BIN_DIR
          echo "Downloading frame-omni-bencher..."
          curl -fL -o frame-omni-bencher "https://github.com/paritytech/polkadot-sdk/releases/download/${POLKADOT_SDK_VERSION}/frame-omni-bencher"
          echo "${FRAME_OMNI_BENCHER_SHA256}  frame-omni-bencher" | sha256sum -c -
          chmod +x frame-omni-bencher
          ./frame-omni-bencher --version

      - name: Run benchmarks (${{ matrix.runtime.name }})
        run: |
          python3 ./scripts/cmd/cmd.py bench --runtime ${{ matrix.runtime.name }} --steps 2 --repeat 1 --profile release

      - name: Run release check (${{ matrix.runtime.name }})
        run: |
          cargo check --profile release -p ${{ matrix.runtime.package }}

  all-tests-passed:
    name: All tests passed
    if: always()
    needs: [changes, check-fmt, check, clippy, test, benchmarks]
    runs-on: ubuntu-latest
    steps:
      - name: Decide outcome
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
