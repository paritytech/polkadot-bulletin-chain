name: Check changed files

on:
  workflow_call:
    outputs:
      should-run:
        description: "Whether the workflow should run based on changed files"
        value: ${{ jobs.changes.outputs.should-run }}
      db-files-changed:
        description: "Whether files affecting the node DB backend setup changed (CI env, workflows, zombienet configs, justfiles)"
        value: ${{ jobs.changes.outputs.db-files-changed }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
      db-files-changed: ${{ steps.check.outputs.db-files-changed }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[].filename')
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            FILES=$(gh api repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.event.after }} --jq '.files[].filename')
          else
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "db-files-changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if echo "$FILES" | grep -qvE '^(docs/|.claude/|stress-test/)'; then
            echo "should-run=true" >> $GITHUB_OUTPUT
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
          fi
          if echo "$FILES" | grep -qE '^(\.github/env$|\.github/workflows/|zombienet/|zombienet-sdk-tests/|justfile$|examples/justfile$)'; then
            echo "db-files-changed=true" >> $GITHUB_OUTPUT
          else
            echo "db-files-changed=false" >> $GITHUB_OUTPUT
          fi
