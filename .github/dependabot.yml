version: 2
updates:
  # ---------- cargo ----------
  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"

  - package-ecosystem: "cargo"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"

  # ---------- console-ui ----------
  - package-ecosystem: "npm"
    directory: "/console-ui"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    groups:
      console-ui-deps:
        applies-to: version-updates
        patterns:
          - "*"
      console-ui-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/console-ui"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      console-ui-deps:
        applies-to: version-updates
        patterns:
          - "*"
      console-ui-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ---------- sdk/typescript ----------
  - package-ecosystem: "npm"
    directory: "/sdk/typescript"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    groups:
      sdk-typescript-deps:
        applies-to: version-updates
        patterns:
          - "*"
      sdk-typescript-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/sdk/typescript"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      sdk-typescript-deps:
        applies-to: version-updates
        patterns:
          - "*"
      sdk-typescript-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ---------- examples ----------
  - package-ecosystem: "npm"
    directory: "/examples"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    groups:
      examples-deps:
        applies-to: version-updates
        patterns:
          - "*"
      examples-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/examples"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      examples-deps:
        applies-to: version-updates
        patterns:
          - "*"
      examples-security:
        applies-to: security-updates
        patterns:
          - "*"

  # ---------- github-actions ----------
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    groups:
      github-actions-deps:
        applies-to: version-updates
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    groups:
      github-actions-deps:
        applies-to: version-updates
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
